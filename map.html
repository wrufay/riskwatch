<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>riskwatch</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              graphite: "#3C3744",
              "navy-electric": "#090C9B",
              "royal-azure": "#3D52D5",
              "powder-blue": "#B4C5E4",
              ivory: "#FBFFF1",
              "burnt-tangerine": "#E03616",
            },
            fontFamily: {
              display: ["Mansalva", "cursive"],
              mono: ["VT323", "monospace"],
              sans: ["Inter", "sans-serif"],
              notch: ["Stack Sans Notch", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="font-sans">
    <!-- Map -->
    <div id="map" class="absolute inset-0"></div>

    <!-- Prediction popup (positioned by ol.Overlay) -->
    <!-- Explore popup (historical) -->
    <div id="popup" class="hidden pointer-events-auto z-30 cursor-pointer" onclick="closePopup()">
      <div id="popup-card" class="bg-ivory/50 backdrop-blur-sm rounded-xl p-2.5 sm:p-3 shadow-xl w-40 sm:w-44 relative opacity-80">
        <p id="popup-total" class="font-notch text-graphite text-xs sm:text-sm leading-tight mb-1.5 sm:mb-2">—</p>
        <div class="space-y-1 sm:space-y-1.5">
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] sm:text-xs font-semibold text-burnt-tangerine w-12 sm:w-14 shrink-0">fatal</span>
            <div class="flex-1 bg-powder-blue rounded-full h-1 overflow-hidden">
              <div id="bar-fatal" class="h-full bg-burnt-tangerine rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pct-fatal" class="font-mono text-[10px] sm:text-xs text-graphite w-6 sm:w-7 text-right">0%</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] sm:text-xs font-semibold text-royal-azure w-12 sm:w-14 shrink-0">non-fatal</span>
            <div class="flex-1 bg-powder-blue rounded-full h-1 overflow-hidden">
              <div id="bar-nonfatal" class="h-full bg-royal-azure rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pct-nonfatal" class="font-mono text-[10px] sm:text-xs text-graphite w-6 sm:w-7 text-right">0%</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] sm:text-xs font-semibold text-navy-electric w-12 sm:w-14 shrink-0">prop dmg</span>
            <div class="flex-1 bg-powder-blue rounded-full h-1 overflow-hidden">
              <div id="bar-propdmg" class="h-full bg-navy-electric rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pct-propdmg" class="font-mono text-[10px] sm:text-xs text-graphite w-6 sm:w-7 text-right">0%</span>
          </div>
        </div>
        <p id="popup-conditions" class="font-mono text-[10px] sm:text-xs text-graphite opacity-60 mt-1.5 sm:mt-2 leading-snug hidden"></p>
        <p id="popup-cf" class="font-sans text-[10px] sm:text-xs text-royal-azure mt-1 leading-snug hidden"></p>
        <button onclick="event.stopPropagation(); openExplorer()" class="mt-1.5 sm:mt-2 font-mono text-[10px] sm:text-xs text-royal-azure hover:text-navy-electric">view all records ➜</button>
        <div class="absolute left-1/2 -translate-x-1/2 -bottom-2 w-3 h-3 bg-ivory/75 rotate-45"></div>
      </div>
    </div>

    <!-- Predict popup (ML) -->
    <div id="predict-popup" class="hidden pointer-events-auto z-30 cursor-pointer" onclick="closePredictPopup()">
      <div class="bg-graphite/80 backdrop-blur-sm rounded-xl p-2.5 sm:p-3 shadow-xl w-48 sm:w-56 relative">
        <!-- Severity label -->
        <p id="predict-severity" class="font-notch text-ivory text-sm sm:text-base leading-tight mb-1.5 sm:mb-2">—</p>

        <!-- Input conditions used -->
        <div id="predict-conditions" class="flex flex-wrap gap-1 mb-1.5 sm:mb-2"></div>

        <!-- Road enrichment -->
        <p id="predict-road-info" class="font-mono text-[10px] sm:text-xs text-powder-blue opacity-70 leading-snug mb-1.5 sm:mb-2 hidden"></p>

        <!-- Probability bars -->
        <div class="space-y-1 sm:space-y-1.5 mb-1.5 sm:mb-2">
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] sm:text-xs font-semibold text-burnt-tangerine w-12 sm:w-14 shrink-0">fatal</span>
            <div class="flex-1 rounded-full h-1 overflow-hidden" style="background:#5a5562">
              <div id="pred-bar-fatal" class="h-full bg-burnt-tangerine rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pred-pct-fatal" class="font-mono text-[10px] sm:text-xs text-ivory w-6 sm:w-7 text-right">0%</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] sm:text-xs font-semibold text-powder-blue w-12 sm:w-14 shrink-0">non-fatal</span>
            <div class="flex-1 rounded-full h-1 overflow-hidden" style="background:#5a5562">
              <div id="pred-bar-nonfatal" class="h-full bg-powder-blue rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pred-pct-nonfatal" class="font-mono text-[10px] sm:text-xs text-ivory w-6 sm:w-7 text-right">0%</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] sm:text-xs font-semibold text-royal-azure w-12 sm:w-14 shrink-0">prop dmg</span>
            <div class="flex-1 rounded-full h-1 overflow-hidden" style="background:#5a5562">
              <div id="pred-bar-propdmg" class="h-full bg-royal-azure rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pred-pct-propdmg" class="font-mono text-[10px] sm:text-xs text-ivory w-6 sm:w-7 text-right">0%</span>
          </div>
        </div>

        <!-- Key factors -->
        <p id="predict-factors" class="font-mono text-[10px] sm:text-xs text-powder-blue opacity-60 leading-snug mb-1 hidden"></p>

        <!-- Counterfactual -->
        <p id="predict-cf" class="font-sans text-[10px] sm:text-xs text-burnt-tangerine leading-snug hidden"></p>

        <button onclick="event.stopPropagation(); openPredictDetail()" class="mt-1.5 sm:mt-2 font-mono text-[10px] sm:text-xs text-powder-blue hover:text-ivory">view full reasoning ➜</button>

        <div class="absolute left-1/2 -translate-x-1/2 -bottom-2 w-3 h-3 bg-graphite/80 rotate-45"></div>
      </div>
    </div>

    <!-- Predict detail modal -->
    <div id="predict-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-graphite/70 backdrop-blur-sm pointer-events-auto cursor-pointer" onclick="closePredictDetail()">
      <div class="bg-graphite rounded-2xl shadow-2xl w-[540px] max-w-[95vw] max-h-[80vh] flex flex-col overflow-hidden border border-powder-blue/20 cursor-default" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-3 sm:px-5 py-2 sm:py-3 border-b border-powder-blue/20">
          <div>
            <p id="pmodal-severity" class="font-notch text-ivory text-base sm:text-lg leading-none">—</p>
            <p id="pmodal-road" class="font-mono text-xs sm:text-sm text-powder-blue opacity-60 mt-0.5"></p>
          </div>
          <div id="pmodal-conditions" class="flex flex-wrap gap-1 mx-2"></div>
          <button onclick="closePredictDetail()" class="font-notch text-powder-blue hover:text-ivory text-xl sm:text-2xl leading-none ml-2 sm:ml-4">×</button>
        </div>
        <div class="overflow-y-auto px-3 sm:px-5 py-3 sm:py-4 space-y-4 sm:space-y-5 flex-1">

          <!-- Probability -->
          <div>
            <p class="font-mono text-xs sm:text-sm text-powder-blue opacity-50 uppercase tracking-widest mb-2">probability</p>
            <div class="space-y-1.5 sm:space-y-2">
              <div class="flex items-center gap-2">
                <span class="font-sans text-xs sm:text-sm font-semibold text-burnt-tangerine w-16 sm:w-20 shrink-0">fatal</span>
                <div class="flex-1 rounded-full h-1.5 sm:h-2 overflow-hidden" style="background:#2a2730">
                  <div id="pmodal-bar-fatal" class="h-full bg-burnt-tangerine rounded-full transition-all duration-700" style="width:0%"></div>
                </div>
                <span id="pmodal-pct-fatal" class="font-mono text-xs sm:text-sm text-ivory w-8 sm:w-10 text-right">0%</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="font-sans text-xs sm:text-sm font-semibold text-powder-blue w-16 sm:w-20 shrink-0">non-fatal</span>
                <div class="flex-1 rounded-full h-1.5 sm:h-2 overflow-hidden" style="background:#2a2730">
                  <div id="pmodal-bar-nonfatal" class="h-full bg-powder-blue rounded-full transition-all duration-700" style="width:0%"></div>
                </div>
                <span id="pmodal-pct-nonfatal" class="font-mono text-xs sm:text-sm text-ivory w-8 sm:w-10 text-right">0%</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="font-sans text-xs sm:text-sm font-semibold text-royal-azure w-16 sm:w-20 shrink-0">prop dmg</span>
                <div class="flex-1 rounded-full h-1.5 sm:h-2 overflow-hidden" style="background:#2a2730">
                  <div id="pmodal-bar-propdmg" class="h-full bg-royal-azure rounded-full transition-all duration-700" style="width:0%"></div>
                </div>
                <span id="pmodal-pct-propdmg" class="font-mono text-xs sm:text-sm text-ivory w-8 sm:w-10 text-right">0%</span>
              </div>
            </div>
          </div>

          <!-- Feature importance -->
          <div>
            <p class="font-mono text-xs sm:text-sm text-powder-blue opacity-50 uppercase tracking-widest mb-2">what drove this prediction</p>
            <div id="pmodal-factors" class="space-y-1.5"></div>
          </div>

          <!-- All counterfactuals -->
          <div>
            <p class="font-mono text-xs sm:text-sm text-powder-blue opacity-50 uppercase tracking-widest mb-2">what if conditions changed</p>
            <div id="pmodal-alternatives" class="space-y-1"></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Explorer modal -->
    <div id="explorer-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-graphite/60 backdrop-blur-sm pointer-events-auto cursor-pointer" onclick="closeExplorer()">
      <div class="bg-ivory rounded-2xl shadow-2xl w-[480px] max-w-[95vw] max-h-[80vh] flex flex-col overflow-hidden cursor-default" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-3 sm:px-5 py-2 sm:py-3 border-b border-powder-blue">
          <p id="explorer-title" class="font-notch text-graphite text-sm sm:text-base">crash records</p>
          <button onclick="closeExplorer()" class="font-notch text-graphite hover:text-burnt-tangerine text-xl sm:text-2xl leading-none">×</button>
        </div>
        <div id="explorer-list" class="overflow-y-auto px-3 sm:px-5 py-2 sm:py-3 space-y-1.5 sm:space-y-2 flex-1"></div>
      </div>
    </div>

    <!-- Clippy tutorial -->
    <div id="clippy" class="absolute top-3 sm:top-4 left-3 sm:left-4 z-20 flex items-end gap-2">
      <div class="bg-ivory/90 backdrop-blur-sm border-2 border-powder-blue rounded-lg px-2.5 sm:px-3 py-2 relative w-[180px] sm:w-[220px]">
        <p id="clippy-text" class="font-notch text-graphite text-xs sm:text-sm leading-snug min-h-[60px] sm:min-h-[72px] mb-2"></p>
        <div class="flex items-center justify-center gap-2 sm:gap-3 mt-1">
          <button id="clippy-prev" onclick="tutorialPrev()" class="font-mono text-xs sm:text-sm text-royal-azure hover:text-navy-electric">prev</button>
          <span id="clippy-step" class="font-mono text-xs sm:text-sm text-graphite opacity-50">1/7</span>
          <button onclick="dismissClipy()" class="font-mono text-xs sm:text-sm text-burnt-tangerine hover:text-red-700">close</button>
          <button id="clippy-next" onclick="tutorialNext()" class="font-mono text-xs sm:text-sm text-royal-azure hover:text-navy-electric">next</button>
        </div>
      </div>
    </div>

    <!-- Taskbar -->
    <div class="absolute bottom-0 left-0 right-0 z-20 bg-ivory border-t-2 border-b-2 border-royal-azure overflow-x-auto">
      <div class="flex items-end gap-3 px-4 py-2 min-w-max">
        <!-- City -->
        <div class="flex flex-col items-start gap-0.5">
          <span class="font-mono text-xs text-graphite opacity-40 leading-none">city</span>
          <div class="flex border border-royal-azure overflow-hidden rounded-full">
            <button id="btn-ottawa"  onclick="setCity('ottawa')"  class="px-2 sm:px-3 py-1 font-mono text-base sm:text-xl bg-navy-electric text-ivory transition-colors">ottawa</button>
            <button id="btn-halifax" onclick="setCity('halifax')" class="px-2 sm:px-3 py-1 font-mono text-base sm:text-xl bg-royal-azure text-powder-blue transition-colors">halifax</button>
          </div>
        </div>

        <div class="w-px h-6 bg-royal-azure opacity-50 mb-1 shrink-0"></div>

        <!-- Weather -->
        <div class="flex flex-col items-start gap-0.5">
          <span class="font-mono text-xs text-graphite opacity-40 leading-none">weather</span>
          <select id="weather" class="bg-royal-azure text-ivory font-notch border-2 border-graphite text-xs sm:text-sm rounded-full px-2 sm:px-3 py-1 outline-none cursor-pointer" onchange="onConditionChange()">
            <option value="clear">clear</option>
            <option value="rain">rain</option>
            <option value="snow">snow</option>
            <option value="fog">fog</option>
            <option value="strong wind">strong wind</option>
          </select>
        </div>

        <!-- Road -->
        <div class="flex flex-col items-start gap-0.5">
          <span class="font-mono text-xs text-graphite opacity-40 leading-none">road</span>
          <select id="road_surface" class="bg-royal-azure text-ivory font-notch text-xs sm:text-sm border-2 border-graphite rounded-full px-2 sm:px-3 py-1 outline-none cursor-pointer" onchange="onConditionChange()">
            <option value="dry">dry</option>
            <option value="wet">wet</option>
            <option value="ice">ice</option>
            <option value="snow">snow</option>
            <option value="slush">slush</option>
          </select>
        </div>

        <!-- Light -->
        <div class="flex flex-col items-start gap-0.5">
          <span class="font-mono text-xs text-graphite opacity-40 leading-none">light</span>
          <select id="light" class="bg-royal-azure text-ivory font-notch text-xs sm:text-sm border-2 border-graphite rounded-full px-2 sm:px-3 py-1 outline-none cursor-pointer" onchange="onConditionChange()">
            <option value="daylight">daylight</option>
            <option value="dawn">dawn</option>
            <option value="dusk">dusk</option>
            <option value="dark">dark</option>
          </select>
        </div>

        <div class="w-px h-6 bg-royal-azure opacity-50 mb-1 shrink-0"></div>

        <div class="w-px h-6 bg-royal-azure opacity-50 mb-1 shrink-0 ml-auto"></div>

        <!-- Radius -->
        <div class="flex flex-col items-start gap-0.5">
          <span class="font-mono text-xs text-graphite opacity-40 leading-none">radius</span>
          <div class="flex items-center gap-2 py-1">
            <input id="radius" type="range" min="100" max="1000" step="50" value="500" class="w-16 sm:w-20" />
            <span id="radius-label" class="font-mono text-xs sm:text-sm text-powder-blue w-10">500m</span>
          </div>
        </div>

        <div class="w-px h-6 bg-royal-azure opacity-50 mb-1 shrink-0"></div>

        <!-- Mode -->
        <div class="flex flex-col items-start gap-0.5">
          <span class="font-mono text-xs text-graphite opacity-40 leading-none">mode</span>
          <div class="flex border border-royal-azure overflow-hidden rounded-full">
            <button id="btn-explore" onclick="setMode('explore')" class="px-2 sm:px-3 py-1 font-mono text-base sm:text-xl bg-navy-electric text-ivory transition-colors">explore</button>
            <button id="btn-predict" onclick="setMode('predict')" class="px-2 sm:px-3 py-1 font-mono text-base sm:text-xl bg-royal-azure text-powder-blue transition-colors">predict</button>
          </div>
        </div>

        <button onclick="toggleTutorial()" class="font-mono text-sm text-powder-blue hover:text-royal-azure transition-colors mb-1 ml-2">?</button>
      </div>
    </div>
  </body>

  <script src="map.js"></script>
</html>
