<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>riskwatch</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              graphite: "#3C3744",
              "navy-electric": "#090C9B",
              "royal-azure": "#3D52D5",
              "powder-blue": "#B4C5E4",
              ivory: "#FBFFF1",
              "burnt-tangerine": "#E03616",
            },
            fontFamily: {
              display: ["Mansalva", "cursive"],
              mono: ["VT323", "monospace"],
              sans: ["Inter", "sans-serif"],
              notch: ["Stack Sans Notch", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="font-sans">
    <!-- Map -->
    <div id="map" class="absolute inset-0"></div>

    <!-- Prediction popup (positioned by ol.Overlay) -->
    <div id="popup" class="hidden pointer-events-auto z-30">
      <div class="bg-ivory/50 backdrop-blur-sm rounded-xl p-3 shadow-xl w-44 relative opacity-80">
        <button
          onclick="closePopup()"
          class="absolute top-2 right-3 font-mono text-graphite hover:text-burnt-tangerine text-base leading-none"
        >×</button>
        <p id="popup-total" class="font-notch text-graphite text-sm leading-tight mb-2 pr-4">—</p>
        <div class="space-y-1.5">
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] font-semibold text-burnt-tangerine w-14 shrink-0">fatal</span>
            <div class="flex-1 bg-powder-blue rounded-full h-1 overflow-hidden">
              <div id="bar-fatal" class="h-full bg-burnt-tangerine rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pct-fatal" class="font-mono text-[10px] text-graphite w-7 text-right">0%</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] font-semibold text-royal-azure w-14 shrink-0">non-fatal</span>
            <div class="flex-1 bg-powder-blue rounded-full h-1 overflow-hidden">
              <div id="bar-nonfatal" class="h-full bg-royal-azure rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pct-nonfatal" class="font-mono text-[10px] text-graphite w-7 text-right">0%</span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="font-sans text-[10px] font-semibold text-navy-electric w-14 shrink-0">prop dmg</span>
            <div class="flex-1 bg-powder-blue rounded-full h-1 overflow-hidden">
              <div id="bar-propdmg" class="h-full bg-navy-electric rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
            <span id="pct-propdmg" class="font-mono text-[10px] text-graphite w-7 text-right">0%</span>
          </div>
        </div>
        <p id="popup-conditions" class="font-mono text-xs text-graphite opacity-60 mt-2 leading-snug hidden"></p>
        <p id="popup-cf" class="font-sans text-xs text-royal-azure mt-1 leading-snug hidden"></p>
        <div class="absolute left-1/2 -translate-x-1/2 -bottom-2 w-3 h-3 bg-ivory/75 rotate-45"></div>
      </div>
    </div>

    <!-- Clippy tutorial -->
    <div id="clippy" class="absolute top-4 left-4 z-20 flex items-end gap-2 max-w-xs">
      <div class="bg-ivory/90 backdrop-blur-sm border-2 border-powder-blue rounded-lg px-3 py-2 relative w-[220px]">
        <p id="clippy-text" class="font-notch text-graphite text-sm leading-snug min-h-[72px] mb-2"></p>
        <div class="flex items-center justify-center gap-3 mt-1">
          <button id="clippy-prev" onclick="tutorialPrev()" class="font-mono text-sm text-royal-azure hover:text-navy-electric">prev</button>
          <button onclick="dismissClipy()" class="font-mono text-sm text-burnt-tangerine hover:text-red-700">close</button>
          <button id="clippy-next" onclick="tutorialNext()" class="font-mono text-sm text-royal-azure hover:text-navy-electric">next</button>
        </div>
      </div>
    </div>

    <!-- Taskbar -->
    <div
      class="absolute bottom-0 left-0 right-0 z-20 bg-ivory border-t-2 border-b-2 border-royal-azure px-4 py-3 flex items-center gap-4 flex-wrap"
    >
      <!-- City toggle -->
      <div class="flex border border-royal-azure overflow-hidden rounded-full">
        <button
          id="btn-ottawa"
          onclick="setCity('ottawa')"
          class="px-3 py-1 font-mono text-xl bg-navy-electric text-ivory transition-colors"
        >
          ottawa
        </button>
        <button
          id="btn-halifax"
          onclick="setCity('halifax')"
          class="px-3 py-1 font-mono text-xl bg-royal-azure text-powder-blue transition-colors"
        >
          halifax
        </button>
      </div>

      <div class="w-px h-6 bg-royal-azure opacity-50"></div>

      <!-- Weather -->
      <div class="flex items-center gap-2">
        <span class="font-mono text-royal-azure text-xl">weather</span>
        <select
          id="weather"
          class="bg-royal-azure text-ivory font-notch border-2 border-graphite text-sm rounded-full px-3 py-1 outline-none cursor-pointer"
          onchange="onConditionChange()"
        >
          <option value="clear">clear</option>
          <option value="rain">rain</option>
          <option value="snow">snow</option>
          <option value="fog">fog</option>
          <option value="strong wind">strong wind</option>
        </select>
      </div>

      <!-- Road surface -->
      <div class="flex items-center gap-2">
        <span class="font-mono text-royal-azure text-xl">road</span>
        <select
          id="road_surface"
          class="bg-royal-azure text-ivory font-notch text-sm border-2 border-graphite rounded-full px-3 py-1 outline-none cursor-pointer"
          onchange="onConditionChange()"
        >
          <option value="dry">dry</option>
          <option value="wet">wet</option>
          <option value="ice">ice</option>
          <option value="snow">snow</option>
          <option value="slush">slush</option>
        </select>
      </div>

      <!-- Light -->
      <div class="flex items-center gap-2">
        <span class="font-mono text-royal-azure text-xl">light</span>
        <select
          id="light"
          class="bg-royal-azure text-ivory font-notch text-sm border-2 border-graphite rounded-full px-3 py-1 outline-none cursor-pointer"
          onchange="onConditionChange()"
        >
          <option value="daylight">daylight</option>
          <option value="dawn">dawn</option>
          <option value="dusk">dusk</option>
          <option value="dark">dark</option>
        </select>
      </div>

      <!-- Radius -->
      <div class="flex items-center gap-2">
        <span class="font-mono text-royal-azure text-xl">radius</span>
        <input
          id="radius"
          type="range"
          min="100"
          max="1000"
          step="50"
          value="500"
          class="w-20"
        />
        <span id="radius-label" class="font-mono text-sm text-powder-blue w-12">500m</span>
      </div>

      <!-- Status -->
      <span id="status" class="ml-auto font-mono text-sm text-powder-blue"
        >ready.</span
      >

      <button
        onclick="toggleTutorial()"
        class="font-mono text-sm text-powder-blue hover:text-royal-azure transition-colors"
      >
        ?
      </button>
    </div>
  </body>

  <script src="map.js"></script>
</html>
